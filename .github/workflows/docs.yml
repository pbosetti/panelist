name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show version source
        run: |
          git tag --list 'v*.*.*' --sort=-version:refname
          git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 || true

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DPANELIST_BUILD_DOCUMENTATION=ON
          -DPANELIST_BUILD_PACKAGE=OFF
          -DPANELIST_BUILD_TESTS=OFF
          -DPANELIST_BUILD_EXAMPLES=OFF

      - name: Build documentation
        run: cmake --build build --target document

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/docs/html

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
