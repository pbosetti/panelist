name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DPANELIST_BUILD_TESTS=ON
          -DPANELIST_BUILD_EXAMPLES=ON
          -DPANELIST_BUILD_PACKAGE=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cmake --build build --target package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          "build/panelist-${GITHUB_REF_NAME}.tar.gz"
          --title "${GITHUB_REF_NAME}"
          --notes "Panelist ${GITHUB_REF_NAME}"
